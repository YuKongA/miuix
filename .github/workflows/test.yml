name: Build All Tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "example/ios/iosApp/Info.plist"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "example/ios/iosApp/Info.plist"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "iosSimulatorArm64Test"
            os: macos-latest
          - target: "desktopTest"
            os: ubuntu-latest
          - target: "assembleAndroidTest"
            os: ubuntu-latest
          - target: "wasmJsBrowserTest"
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Trigger Android SDK download
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: ./gradlew help --no-configuration-cache > /dev/null 2>&1 || true
      - name: Fix Android SDK 37 platform naming
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          PLATFORMS_DIR="$ANDROID_HOME/platforms"
          if [ -d "$PLATFORMS_DIR/android-37.0" ] && [ ! -d "$PLATFORMS_DIR/android-37" ]; then
            ln -s "$PLATFORMS_DIR/android-37.0" "$PLATFORMS_DIR/android-37"
          fi
      - name: Run check
        if: matrix.os == 'macos-latest'
        run: ./gradlew check
      - name: Run test
        run: ./gradlew ${{ matrix.target }}
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/**
